<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar</title>
    <style>
        * {
            margin: 20px;
            padding: 0px;
            font-family: Arial, sans-serif;
        }

        .navbar {
            border: 1px solid black;
            background: #f5f5f5;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0px;
            box-sizing: border-box;
        }

        .menu {
            display: flex;
            gap: 10px;
        }

        .menu div {
            cursor: pointer;
        }

        .menu div:hover {
            color: blue;
        }

        img {
            margin-left: -20px;
        }

        .nav-item:hover {
            background: #e0e0e0;
        }
        
        .right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .download {
            background: #f7c948;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .download:hover {
            background: #e0b030;
        }

        .lang,
        .search {
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div>
            <img height="50px" src="logo1.png" alt="background">
        </div>

        <div class="menu">
            <div class="nav-item">Product ▼</div>
            <div>Buy</div>
            <div>Renew</div>
            <div class="nav-item">Support ▼</div>
            <div class="nav-item">Learn ▼</div>
            <div class="nav-item">Resource ▼</div>
            <div class="nav-item">Company ▼</div>
        </div>

        <div class="right">
            <button class="download">Download</button>
            <div class="lang">🌐 English</div>
            <div class="search">🔍</div>
        </div>
    </div>
</body>

</html>
